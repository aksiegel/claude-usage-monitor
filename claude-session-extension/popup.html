<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Claude Usage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e2e8f0; width: 300px; padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #2d2d4e; }
    .header h1 { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .subtitle { font-size: 11px; color: #64748b; }
    .refresh-btn { margin-left: auto; background: none; border: 1px solid #2d2d4e; color: #94a3b8; cursor: pointer; border-radius: 4px; padding: 4px 8px; font-size: 11px; transition: all 0.2s; }
    .refresh-btn:hover { background: #2d2d4e; color: #e2e8f0; }
    .usage-card { background: #16213e; border: 1px solid #2d2d4e; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .usage-card.highlight { border-color: #3d3d6e; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-title { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-percent { font-size: 18px; font-weight: 700; }
    .green { color: #22c55e; }
    .yellow { color: #eab308; }
    .red { color: #ef4444; }
    .progress-wrap { background: #0f0f1e; border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 6px; border: 1px solid #2d2d4e; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .fill-green { background: linear-gradient(90deg, #16a34a, #22c55e); }
    .fill-yellow { background: linear-gradient(90deg, #ca8a04, #eab308); }
    .fill-red { background: linear-gradient(90deg, #dc2626, #ef4444); }
    .reset-text { font-size: 11px; color: #475569; }
    .footer { margin-top: 10px; font-size: 10px; color: #334155; text-align: center; }
    .open-link { display: block; text-align: center; margin-top: 10px; padding: 6px; background: #2d2d4e; border-radius: 6px; color: #94a3b8; font-size: 11px; text-decoration: none; transition: background 0.2s; }
    .open-link:hover { background: #3d3d6e; color: #e2e8f0; }
    .error-box { background: #2d1515; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px; color: #fca5a5; font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Claude Usage Monitor</h1>
      <div class="subtitle" id="lastUpdated">Lade...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>
  <div id="content"></div>
  <a href="https://claude.ai/settings/usage" target="_blank" class="open-link">↗ claude.ai/settings/usage öffnen</a>
  <script src="popup.js"></script>
</body>
</html>
